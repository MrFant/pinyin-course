<h2>互动练习的风格</h2>
<p class="subtitle">选择你喜欢的练习风格</p>

<div class="options">
  <div class="option" data-choice="flashcard" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>闪卡模式</h3>
      <p>像抽卡片一样，正面显示拼音，点击翻转显示答案，简单直观</p>
    </div>
  </div>
  <div class="option" data-choice="quiz" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>测验模式</h3>
      <p>选择题形式，每题有多个选项，选择正确答案，有即时反馈</p>
    </div>
  </div>
  <div class="option" data-choice="typing-challenge" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>打字挑战</h3>
      <p>显示汉字，用户需要输入正确拼音，实时检查准确性</p>
    </div>
  </div>
</div>
