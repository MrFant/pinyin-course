<h2>你想要哪些核心功能？</h2>
<p class="subtitle">选择你认为最重要的功能（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="typing-test" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>打字速度测试</h3>
      <p>实时测试打字速度，记录进步，提供速度等级评估</p>
    </div>
  </div>
  <div class="option" data-choice="interactive-exercises" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>互动练习</h3>
      <p>拼音选择题、声调判断、词语拼读等交互式练习</p>
    </div>
  </div>
  <div class="option" data-choice="progress-tracking" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>学习进度跟踪</h3>
      <p>记录学习进度，显示完成情况，提供学习建议</p>
    </div>
  </div>
  <div class="option" data-choice="gamification" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>游戏化元素</h3>
      <p>积分、徽章、排行榜、成就系统等游戏化设计</p>
    </div>
  </div>
</div>
