<h2>技术栈选择</h2>
<p class="subtitle">选择你偏好的技术方案</p>

<div class="options">
  <div class="option" data-choice="vanilla" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>纯HTML/CSS/JavaScript</h3>
      <p>无需框架，简单直接，加载速度快，易于维护，适合静态部署</p>
    </div>
  </div>
  <div class="option" data-choice="react" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>React + Vite</h3>
      <p>现代前端框架，组件化开发，交互体验好，适合复杂应用</p>
    </div>
  </div>
  <div class="option" data-choice="vue" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Vue + Vite</h3>
      <p>易学易用，响应式数据，适合快速开发，中文文档友好</p>
    </div>
  </div>
</div>
